<!DOCTYPE html>
<html>
<head>
    <title>Intro</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        /* BACKGROUND */
        .bg {
            position: fixed;
            inset: 0;
            background: url("/static/images/{{ category }}.jpeg") center/cover no-repeat;
            filter: brightness(0.35) blur(2px);
            transform: scale(1.05);
        }

        /* DARK OVERLAY */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center,
                rgba(0,0,0,0.3),
                rgba(0,0,0,0.92)
            );
            z-index: 0;
        }

        /* CONTENT */
        .content {
            position: relative;
            z-index: 1;
            height: 100vh;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;

            animation: fadeIn 0.6s ease;
        }

        h1 {
            font-size: 56px;
            margin: 0;
            font-weight: 800;
            letter-spacing: 1px;
        }

        p {
            margin-top: 12px;
            color: rgba(255,255,255,0.75);
            font-size: 18px;
        }

        .tag {
            margin-top: 10px;
            font-size: 13px;
            color: #e50914;
            letter-spacing: 2px;
        }

        /* BUTTON */
        .btn {
            margin-top: 35px;
            padding: 16px 32px;

            background: #e50914;
            border: none;
            color: white;

            font-size: 16px;
            font-weight: bold;

            border-radius: 30px;
            cursor: pointer;

            transition: 0.3s ease;
            box-shadow: 0 10px 25px rgba(229,9,20,0.4);
        }

        .btn:hover {
            transform: scale(1.08);
            background: #ff0a16;
        }

        /* AUTO START EFFECT */
        .loading {
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>

<body>

<div class="bg"></div>

<div class="content">

    <div class="tag">QUIZFLIX ORIGINAL</div>

    <h1>{{ category|capitalize }} Quiz</h1>

    <p>Test your knowledge. One category. One challenge.</p>

    <a href="/start/{{ category }}">
        <button class="btn">▶ Play</button>
    </a>

    <div class="loading" id="loadingText">
        Loading experience...
    </div>

</div>

<script>
    // OPTIONAL AUTO START (Netflix feel)
    setTimeout(() => {
        document.getElementById("loadingText").innerText =
            "Starting quiz...";
    }, 2000);

    setTimeout(() => {
        window.location.href = "/start/{{ category }}";
    }, 4000);
</script>

</body>
</html>
