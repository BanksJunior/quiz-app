<!DOCTYPE html>
<html>
<head>
    <title>QuizFlix Welcome</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        /* 🎬 BACKGROUND IMAGE (home.jpeg) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url("/static/images/home.jpeg") center/cover no-repeat;
            filter: brightness(0.35);
            transform: scale(1.05);
            z-index: 0;
        }

        /* DARK OVERLAY */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center,
                rgba(0,0,0,0.2),
                rgba(0,0,0,0.92)
            );
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            height: 100vh;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 64px;
            margin: 0;
            font-weight: 900;
            letter-spacing: 1px;
        }

        p {
            margin-top: 12px;
            color: rgba(255,255,255,0.75);
            font-size: 18px;
        }

        .btn {
            margin-top: 35px;
            padding: 16px 40px;
            background: #e50914;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.08);
            background: #ff0a16;
        }
    </style>
</head>

<body>

<div class="content">

    <h1>QuizFlix</h1>
    <p>Welcome to your cinematic quiz experience</p>

    <a href="/home">
        <button class="btn">Enter ▶</button>
    </a>

</div>

</body>
</html>
