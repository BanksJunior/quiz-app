<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
            color: #222;
        }

        header {
            text-align: center;
            padding: 50px 20px 20px;
        }

        header h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 16px;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 0 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            text-decoration: none;
            color: #222;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .emoji {
            font-size: 34px;
            display: block;
            margin-bottom: 12px;
        }

        .card h3 {
            margin: 0;
            font-size: 18px;
        }

        .card::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.05);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .card:hover::after {
            left: 120%;
        }
    </style>
</head>

<body>

<header>
    <h1>🎯 Quiz App</h1>
    <p>Choose a category and test your knowledge</p>
</header>

<div class="container">

    <a class="card" href="/start/anime">
        <span class="emoji">🎬</span>
        <h3>Anime</h3>
    </a>

    <a class="card" href="/start/movies">
        <span class="emoji">🎥</span>
        <h3>Movies</h3>
    </a>

    <a class="card" href="/start/series">
        <span class="emoji">📺</span>
        <h3>Series</h3>
    </a>

    <a class="card" href="/start/football">
        <span class="emoji">⚽</span>
        <h3>Football</h3>
    </a>

    <a class="card" href="/start/music">
        <span class="emoji">🎵</span>
        <h3>Music</h3>
    </a>

    <a class="card" href="/start/animated_series">
        <span class="emoji">🦸</span>
        <h3>Animated Series</h3>
    </a>

    <a class="card" href="/start/kdrama">
        <span class="emoji">🎭</span>
        <h3>K-Drama</h3>
    </a>

</div>

</body>
</html>
