<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #eef2f3;
            padding: 40px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #555;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .card {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 180px;
            height: 90px;
            background: white;
            border-radius: 12px;
            text-decoration: none;
            color: black;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.2s ease;
            font-weight: bold;
        }

        .card:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<h1>🎯 Quiz App</h1>
<p>Select a category</p>

<div class="card-container">

    <a class="card" href="/start/anime">🎬 Anime</a>

    <a class="card" href="/start/animated_series">📺 Animated Series</a>

    <a class="card" href="/start/kdrama">🎭 K-Drama</a>

    <a class="card" href="/start/football">⚽ Football</a>

    <a class="card" href="/start/movies">🎥 Movies</a>

    <a class="card" href="/start/music">🎵 Music</a>

    <a class="card" href="/start/series">📺 Series</a>

</div>

</body>
</html>
