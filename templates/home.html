<!DOCTYPE html>
<html>
<head>
    <title>Quiz Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;

            /* FULL BACKGROUND */
            background: url("/static/images/home.jpeg") no-repeat center center fixed;
            background-size: cover;

            position: relative;
            min-height: 100vh;

            overflow-x: hidden;
        }

        /* CINEMATIC OVERLAY */
        body::before {
            content: "";
            position: fixed;
            inset: 0;

            background: radial-gradient(circle at center,
                rgba(0,0,0,0.20),
                rgba(0,0,0,0.85),
                rgba(0,0,0,0.96)
            );

            z-index: 0;
        }

        /* KEEP CONTENT ABOVE OVERLAY */
        .header,
        .grid,
        .footer {
            position: relative;
            z-index: 1;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 60px 20px 20px;
        }

        .header h1 {
            font-size: 52px;
            margin: 0;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .header p {
            color: rgba(255,255,255,0.7);
            margin-top: 10px;
            font-size: 16px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 18px;

            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        /* CATEGORY CARD */
        .card {
            position: relative;
            height: 170px;
            border-radius: 18px;
            overflow: hidden;

            display: flex;
            align-items: flex-end;
            justify-content: center;

            text-decoration: none;
            color: white;

            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;

            background-size: cover;
            background-position: center;

            box-shadow: 0 10px 25px rgba(0,0,0,0.4);

            transition: all 0.3s ease;
        }

        .card:hover {
            transform: scale(1.07);
            box-shadow: 0 18px 35px rgba(0,0,0,0.6);
        }

        /* CARD OVERLAY */
        .card::before {
            content: "";
            position: absolute;
            inset: 0;

            background: rgba(0,0,0,0.35);

            z-index: 0;
        }

        /* CARD TEXT */
        .card span {
            position: relative;
            z-index: 1;

            background: rgba(0,0,0,0.65);

            padding: 8px 14px;
            border-radius: 10px;

            margin-bottom: 14px;
        }

        /* CATEGORY BACKGROUNDS */
        .music {
            background-image: url("/static/images/music.jpeg");
        }

        .kdrama {
            background-image: url("/static/images/kdrama.jpeg");
        }

        .anime {
            background-image: url("/static/images/anime.jpeg");
        }

        .animated_series {
            background-image: url("/static/images/animated_series.jpeg");
        }

        .football {
            background-image: url("/static/images/football.jpeg");
        }

        .movies {
            background-image: url("/static/images/movies.jpeg");
        }

        .series {
            background-image: url("/static/images/series.jpeg");
        }

        /* FOOTER */
        .footer {
            text-align: center;

            margin-top: 40px;
            padding-bottom: 20px;

            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }

    </style>
</head>

<body>

<div class="header">
    <h1>QuizFlix</h1>
    <p>Choose your category</p>
</div>

<div class="grid">

    <a class="card music" href="/intro/music">
        <span>Music</span>
    </a>

    <a class="card kdrama" href="/intro/kdrama">
        <span>K-Drama</span>
    </a>

    <a class="card anime" href="/intro/anime">
        <span>Anime</span>
    </a>

    <a class="card animated_series" href="/intro/animated_series">
        <span>Animated</span>
    </a>

    <a class="card football" href="/intro/football">
        <span>Football</span>
    </a>

    <a class="card movies" href="/intro/movies">
        <span>Movies</span>
    </a>

    <a class="card series" href="/intro/series">
        <span>Series</span>
    </a>

</div>

<div class="footer">
    Powered by Flask • Quiz App
</div>

</body>
</html>
