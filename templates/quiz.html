<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            position: relative;
        }

        /* BACKGROUNDS */
        body.anime {
            background: url("/static/images/anime.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        body.animated_series {
            background: url("/static/images/animated_series.jpeg") no-repeat center center fixed;
            background-size: cover;
        }

        body.kdrama {
            background: url("/static/images/kdrama.jpeg") no-repeat center center fixed;
            background-size: cover;
        }

        body.football {
            background: url("/static/images/football.jpeg") no-repeat center center fixed;
            background-size: cover;
        }

        body.movies {
            background: url("/static/images/movies.jpeg") no-repeat center center fixed;
            background-size: cover;
        }

        body.music {
            background: url("/static/images/music.jpeg") no-repeat center center fixed;
            background-size: cover;
        }

        body.series {
            background: url("/static/images/series.jpeg") no-repeat center center fixed;
            background-size: cover;
        }

        /* OVERLAY */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            background: white;
            max-width: 560px;
            margin: 40px auto;
            padding: 22px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .top {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
        }

        .timer {
            font-weight: bold;
            color: #ff4d4d;
        }

        .warning {
            color: #ff4d4d;
        }

        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 18px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            width: 0%;
        }

        .question {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 18px;
        }

        form button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #eee;
            background: #fff;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
        }
    </style>
</head>

<!-- 🔥 FIX IS HERE -->
<body class="{{ category|lower|replace(' ', '_') }}">

<div class="card">

    <div class="top">
        <div>Question {{ index }} / {{ total }}</div>
        <div class="timer">⏳ <span id="time">15</span>s</div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
    </div>

    <div class="question">
        {{ question.question }}
    </div>

    <form id="quizForm" method="POST">
        {% for option in question.options %}
            <button type="submit" name="answer" value="{{ option }}">
                {{ option }}
            </button>
        {% endfor %}
    </form>

</div>

<script>
    let timeLeft = 15;
    const timerEl = document.getElementById("time");
    const form = document.getElementById("quizForm");

    let submitted = false;

    const total = {{ total }};
    const current = {{ index }};

    document.getElementById("progress").style.width =
        ((current - 1) / total) * 100 + "%";

    function submitOnce() {
        if (submitted) return;
        submitted = true;
        form.submit();
    }

    const timer = setInterval(() => {
        timeLeft--;
        timerEl.innerText = timeLeft;

        if (timeLeft <= 5) {
            timerEl.classList.add("warning");
        }

        if (timeLeft <= 0) {
            clearInterval(timer);
            submitOnce();
        }
    }, 1000);
</script>

</body>
</html>
