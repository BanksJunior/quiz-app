<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            position: relative;
            color: white;
        }

        /* BACKGROUNDS */
        body.anime {
            background: url("/static/images/anime.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        body.animated_series {
            background: url("/static/images/animated_series.jpeg") no-repeat center center fixed;
            background-size: cover;
        }

        body.kdrama {
            background: url("/static/images/kdrama.jpeg") no-repeat center center fixed;
            background-size: cover;
        }

        body.football {
            background: url("/static/images/football.jpeg") no-repeat center center fixed;
            background-size: cover;
        }

        body.movies {
            background: url("/static/images/movies.jpeg") no-repeat center center fixed;
            background-size: cover;
        }

        body.music {
            background: url("/static/images/music.jpeg") no-repeat center center fixed;
            background-size: cover;
        }

        body.series {
            background: url("/static/images/series.jpeg") no-repeat center center fixed;
            background-size: cover;
        }

        /* DARK NETFLIX OVERLAY */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center,
                rgba(0,0,0,0.25),
                rgba(0,0,0,0.85)
            );
            z-index: 0;
        }

        /* CARD (NETFLIX STYLE) */
        .card {
            position: relative;
            z-index: 1;

            max-width: 700px;
            margin: 60px auto;
            padding: 32px;

            border-radius: 18px;

            background: rgba(0,0,0,0.70);
            backdrop-filter: blur(14px);

            border: 1px solid rgba(255,255,255,0.08);

            box-shadow: 0 25px 60px rgba(0,0,0,0.7);

            animation: fadeIn .35s ease;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;

            font-size: 14px;
            color: rgba(255,255,255,0.8);

            margin-bottom: 14px;
        }

        .timer {
            font-weight: bold;
            color: #ffd166;
        }

        .warning {
            color: #ff4d4d !important;
        }

        /* PROGRESS */
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e50914, #ff3b3b);
            width: 0%;
            transition: width .4s ease;
        }

        /* QUESTION */
        .question {
            font-size: 26px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 28px;
        }

        /* OPTIONS (NETFLIX RED HOVER) */
        form button {
            width: 100%;
            padding: 16px;
            margin: 10px 0;

            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.12);

            background: rgba(255,255,255,0.06);
            color: white;

            font-size: 15px;
            font-weight: 600;

            text-align: left;

            cursor: pointer;

            transition: all 0.25s ease;
        }

        form button:hover {
            background: #e50914;
            border-color: #e50914;
            transform: scale(1.02);
        }

        form button:active {
            transform: scale(0.98);
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .card {
                margin: 25px auto;
                padding: 20px;
            }

            .question {
                font-size: 20px;
            }
        }
    </style>
</head>

<body class="{{ category|lower|replace(' ', '_') }}">

<div class="card">

    <div class="top">
        <div>Question {{ index }} / {{ total }}</div>
        <div class="timer">⏳ <span id="time">15</span>s</div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
    </div>

    <div class="question">
        {{ question.question }}
    </div>

    <form id="quizForm" method="POST">
        {% for option in question.options %}
            <button type="submit" name="answer" value="{{ option }}">
                {{ option }}
            </button>
        {% endfor %}
    </form>

</div>

<script>
    let timeLeft = 15;
    const timerEl = document.getElementById("time");
    const form = document.getElementById("quizForm");

    let submitted = false;

    const total = {{ total }};
    const current = {{ index }};

    document.getElementById("progress").style.width =
        ((current - 1) / total) * 100 + "%";

    function submitOnce() {
        if (submitted) return;
        submitted = true;
        form.submit();
    }

    const timer = setInterval(() => {
        timeLeft--;
        timerEl.innerText = timeLeft;

        if (timeLeft <= 5) {
            timerEl.classList.add("warning");
        }

        if (timeLeft <= 0) {
            clearInterval(timer);
            submitOnce();
        }
    }, 1000);
</script>

</body>
</html>
