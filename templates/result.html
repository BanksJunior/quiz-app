<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef2f3, #d9e4f5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            width: 420px;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        .score {
            font-size: 26px;
            margin: 20px 0;
            font-weight: bold;
        }

        .message {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 18px;
            margin: 8px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            transition: 0.2s;
        }

        .home {
            background: #4CAF50;
            color: white;
        }

        .home:hover {
            background: #45a049;
        }

        .retry {
            background: #2196F3;
            color: white;
        }

        .retry:hover {
            background: #1976d2;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>🎉 Quiz Finished</h1>

    <div class="score">
        Your Score: {{ score }}
    </div>

    <div class="message">
        {% if score <= 2 %}
            Keep practicing! 💪
        {% elif score <= 5 %}
            Good job! 👍
        {% else %}
            Excellent work! 🔥
        {% endif %}
    </div>

    <a class="btn home" href="/">Home</a>

    <!-- optional: restart same category -->
    <a class="btn retry" href="/start/{{ session.get('category') }}">Retry</a>

</div>

</body>
</html>
