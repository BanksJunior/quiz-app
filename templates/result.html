<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #eef2f3, #d9e4f5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            width: 420px;
            padding: 35px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 18px 40px rgba(0,0,0,0.15);
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .emoji {
            font-size: 60px;
            margin-bottom: 10px;
        }

        h1 {
            margin: 10px 0;
            font-size: 28px;
        }

        .score {
            font-size: 22px;
            margin: 15px 0;
            font-weight: bold;
        }

        .message {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            margin: 8px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s ease;
        }

        .home {
            background: #4facfe;
            color: white;
        }

        .retry {
            background: #eee;
            color: #333;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .bar {
            height: 10px;
            background: #eee;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
        }

        .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            transition: width 1s ease;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="emoji" id="emoji">🎯</div>

    <h1>Quiz Completed!</h1>

    <div class="score">
        Your Score: {{ score }}
    </div>

    <div class="bar">
        <div class="fill" id="fill"></div>
    </div>

    <div class="message" id="message">
        Loading result...
    </div>

    <a class="btn home" href="/">🏠 Home</a>

</div>

<script>
    let score = {{ score }};
    let max = 20; // you can adjust if needed
    let percent = (score / max) * 100;

    document.getElementById("fill").style.width = percent + "%";

    let message = "";
    let emoji = "";

    if (percent >= 80) {
        message = "🔥 Legendary! You're a genius!";
        emoji = "🏆";
    } else if (percent >= 50) {
        message = "👍 Good job! You did well!";
        emoji = "🎉";
    } else {
        message = "😅 Keep practicing and try again!";
        emoji = "📚";
    }

    document.getElementById("message").innerText = message;
    document.getElementById("emoji").innerText = emoji;
</script>

</body>
</html>
