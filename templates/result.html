<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eef2f3, #d9e4f5);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 650px;
            padding: 30px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 18px 40px rgba(0,0,0,0.15);
            animation: pop 0.4s ease;
        }

        @keyframes pop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .emoji { font-size: 50px; margin-bottom: 10px; }

        h1 { font-size: 26px; }

        .score {
            font-size: 22px;
            font-weight: bold;
            margin: 10px 0;
        }

        .bar {
            height: 12px;
            background: #eee;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
        }

        .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            transition: width 1s ease;
        }

        .message {
            font-size: 16px;
            color: #555;
            margin-bottom: 20px;
        }

        .wrong-box {
            margin-top: 25px;
            text-align: left;
        }

        .wrong-item {
            background: #fff3f3;
            border-left: 4px solid red;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .correct { color: green; font-weight: bold; }
        .your { color: red; font-weight: bold; }

        a {
            display: inline-block;
            margin: 6px;
            padding: 12px 16px;
            background: #4facfe;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .retry { background: #ff7b7b; }
    </style>
</head>

<body>

<div class="card">

    <div class="emoji" id="emoji">🎯</div>

    <h1>Quiz Completed</h1>

    <div class="score">
        Score: {{ score }}
    </div>

    <div class="bar">
        <div class="fill" id="fill"></div>
    </div>

    <div class="message" id="message"></div>

    <h3>Review Mistakes ❌</h3>

    {% if wrong|length == 0 %}
        <p>🎉 Perfect! No mistakes</p>
    {% else %}
        <div class="wrong-box">
            {% for w in wrong %}
                <div class="wrong-item">
                    <p><b>Q:</b> {{ w.question }}</p>
                    <p class="your">Your Answer: {{ w.selected }}</p>
                    <p class="correct">Correct: {{ w.correct }}</p>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <div class="btns">
        <a href="/">🏠 Home</a>
        <a class="retry" href="/start/{{ category }}">🔁 Retry</a>
    </div>

</div>

<script>
    let score = {{ score }};
    let total = {{ total }};

    let percent = total > 0 ? (score / total) * 100 : 0;

    document.getElementById("fill").style.width = percent + "%";

    let emoji = "";
    let message = "";

    if (percent >= 80) {
        emoji = "🏆";
        message = "Legendary performance!";
    } else if (percent >= 50) {
        emoji = "🔥";
        message = "Good job! Keep improving!";
    } else {
        emoji = "📚";
        message = "Keep practicing!";
    }

    document.getElementById("emoji").innerText = emoji;
    document.getElementById("message").innerText = message;
</script>

</body>
</html>
