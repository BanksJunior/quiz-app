<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #eef2f3, #d9e4f5);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 650px;
            padding: 30px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 18px 40px rgba(0,0,0,0.15);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 26px;
        }

        .score {
            font-size: 22px;
            margin: 15px 0;
            font-weight: bold;
        }

        .bar {
            height: 10px;
            background: #eee;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
        }

        .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            transition: width 1s ease;
        }

        .wrong-box {
            margin-top: 25px;
            text-align: left;
        }

        .wrong-item {
            background: #fff3f3;
            border-left: 4px solid red;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .correct { color: green; }
        .your { color: red; }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 16px;
            background: #4facfe;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }

        /* 📱 MOBILE */
        @media (max-width: 600px) {
            .card {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }

            .score {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

<div class="card">

    <h1>Quiz Completed 🎯</h1>

    <div class="score">
        Score: {{ score }}
    </div>

    <div class="bar">
        <div class="fill" id="fill"></div>
    </div>

    <h3>Review Mistakes ❌</h3>

    {% if wrong|length == 0 %}
        <p>Perfect! No mistakes 🎉</p>
    {% else %}
        <div class="wrong-box">
            {% for w in wrong %}
                <div class="wrong-item">
                    <p><b>Q:</b> {{ w.question }}</p>
                    <p class="your"><b>Your Answer:</b> {{ w.selected }}</p>
                    <p class="correct"><b>Correct:</b> {{ w.correct }}</p>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <a href="/">🏠 Home</a>

</div>

<script>
    let score = {{ score }};
    let max = 20;
    let percent = (score / max) * 100;
    document.getElementById("fill").style.width = percent + "%";
</script>

</body>
</html>
