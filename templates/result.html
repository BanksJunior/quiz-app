<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        /* BACKGROUND */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url("/static/images/{{ category }}.jpeg") center/cover no-repeat;
            filter: brightness(0.25) blur(2px);
            transform: scale(1.05);
            z-index: 0;
        }

        /* DARK OVERLAY */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center,
                rgba(0,0,0,0.2),
                rgba(0,0,0,0.92)
            );
            z-index: 0;
        }

        /* CONTAINER */
        .container {
            position: relative;
            z-index: 1;
            height: 100vh;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            text-align: center;

            animation: fadeIn 0.6s ease;
        }

        h1 {
            font-size: 64px;
            margin: 0;
            font-weight: 800;
            animation: pop 0.6s ease;
        }

        .score {
            margin-top: 20px;
            font-size: 34px;
            font-weight: bold;
            color: #e50914;

            padding: 14px 22px;
            border-radius: 14px;

            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .message {
            margin-top: 12px;
            font-size: 16px;
            color: rgba(255,255,255,0.7);
        }

        .stats {
            margin-top: 28px;
            display: flex;
            gap: 20px;
        }

        .stat {
            background: rgba(255,255,255,0.08);
            padding: 14px 20px;
            border-radius: 12px;
            min-width: 120px;
            backdrop-filter: blur(10px);
        }

        .stat span {
            display: block;
            font-size: 22px;
            font-weight: bold;
        }

        .stat small {
            color: rgba(255,255,255,0.6);
        }

        /* BUTTONS */
        .buttons {
            margin-top: 35px;
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 30px;
            border: none;
            cursor: pointer;

            font-size: 15px;
            font-weight: bold;

            transition: 0.25s ease;
        }

        .home {
            background: #e50914;
            color: white;
        }

        .retry {
            background: rgba(255,255,255,0.12);
            color: white;
        }

        .btn:hover {
            transform: scale(1.08);
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Episode Complete</h1>

    <!-- SCORE -->
    <div class="score">
        {{ score }} / {{ total }}
    </div>

    <div class="message">
        {{ category|capitalize }} Quiz Finished
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat">
            <span>{{ score }}</span>
            <small>Correct</small>
        </div>

        <div class="stat">
            <span>{{ wrong|length }}</span>
            <small>Wrong</small>
        </div>
    </div>

    <!-- BUTTONS -->
    <div class="buttons">

        <a href="/">
            <button class="btn home">🏠 Browse Again</button>
        </a>

        <a href="/start/{{ category }}">
            <button class="btn retry">🔁 Replay</button>
        </a>

        {% if wrong|length > 0 %}
        <a href="/review">
            <button class="btn retry">📘 Review</button>
        </a>
        {% endif %}

    </div>

</div>

</body>
</html>
